name: Test

# Repo-specific build + tests. The image build/push and chart bump live in the
# shared reusable workflow (see publish.yml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o /dev/null .
